        function generateActivePool(lang) {
            let pool = [...questionPool[lang]];
            if (pool.length < 20) pool = [...questionPool['he']];
            
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            return pool.slice(0, 20);
        }

        function regenerateQuestions() {
            solvedQuestions.clear();
            currentQuestions = generateActivePool(currentLang);
            renderQuestionsGrid();
            updateScoreDisplay();
        }

        function updateLangButtonsUI(activeLang) {
            const languages = ['he', 'en', 'ar', 'ru'];
            languages.forEach(lang => {
                const btn = document.getElementById(`btn-lang-${lang}`);
                if (lang === activeLang) {
                    btn.className = "px-3 py-1.5 text-xs font-bold rounded-lg bg-indigo-600 text-white shadow-2xs transition cursor-pointer";
                } else {
                    btn.className = "px-3 py-1.5 text-xs font-bold rounded-lg text-gray-600 hover:text-gray-900 hover:bg-gray-200/60 transition cursor-pointer";
                }
            });
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const data = staticData[lang];
            
            document.getElementById('nav-title').innerText = data.navTitle;
            document.getElementById('score-label').innerText = data.scoreLabel;
            document.getElementById('hist-title').innerText = data.histTitle;
            document.getElementById('hist-text').innerText = data.histText;
            document.getElementById('why-title').innerText = data.whyTitle;
            document.getElementById('why-text').innerText = data.whyText;
            document.getElementById('sample-title').innerText = data.sampleTitle;
            document.getElementById('exercise-title').innerText = data.exerciseTitle;
            document.getElementById('exercise-subtitle').innerText = data.exerciseSubtitle;
            document.getElementById('regen-btn').innerText = data.regenBtn;

            updateLangButtonsUI(lang);

            const isRTL = (lang === 'he' || lang === 'ar');
            document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;

            const sampleContainer = document.getElementById('sample-container');
            sampleContainer.innerHTML = `
                <div class="p-3 bg-indigo-50 border-s-4 border-indigo-600 rounded mb-4 font-semibold text-sm flex items-center gap-2 justify-center" dir="ltr">
                    <span>${data.equationLabel}</span> <span class="math-block" data-expr="\\frac{x}{2} + \\frac{x}{3} = 15"></span>
                </div>
            `;
            
            data.steps.forEach(step => {
                const stepDiv = document.createElement('div');
                stepDiv.className = `p-3 bg-gray-50 rounded border border-gray-200 ${isRTL ? 'text-right' : 'text-left'}`;
                stepDiv.innerHTML = `
                    <div class="text-xs text-gray-500 font-bold mb-1">${step.label}</div>
                    <div class="math-block text-base font-mono text-gray-800" dir="ltr" data-expr="${step.math}"></div>
                `;
                sampleContainer.appendChild(stepDiv);
            });

            currentQuestions = generateActivePool(lang);
            solvedQuestions.clear();
            renderQuestionsGrid();
            updateScoreDisplay();
        }

        function renderQuestionsGrid() {
            const grid = document.getElementById('questions-grid');
            const data = staticData[currentLang];
            grid.innerHTML = '';
            
            currentQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = "p-4 bg-white rounded-xl border border-gray-200 shadow-2xs flex flex-col justify-between space-y-3";
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-gray-100 pb-1">
                        <span class="text-xs font-bold text-indigo-400">#${index + 1}</span>
                    </div>
                    <div class="math-block text-lg font-mono text-gray-900 my-2" dir="ltr" data-expr="${q.expr}"></div>
                    
                    <div class="space-y-2">
                        <input type="number" id="input-${index}" class="w-full border border-gray-300 rounded-lg px-2 py-1 text-sm text-center" dir="ltr" placeholder="?">
                        <button onclick="validateAnswer(${index}, ${q.ans}, '${q.hint.replace(/'/g, "\\'")}')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-1.5 rounded-lg transition cursor-pointer">${data.checkBtn}</button>
                    </div>
                    <div id="feedback-${index}" class="text-xs font-medium text-center hidden p-2 rounded-lg leading-relaxed"></div>
                `;
                grid.appendChild(card);
            });

            if (window.katex) {
                document.querySelectorAll('.math-block').forEach(el => {
                    katex.render(el.getAttribute('data-expr'), el, { displayMode: true, throwOnError: false });
                });
            }
        }

        function validateAnswer(index, correctAnswer, hintMessage) {
            const inputEl = document.getElementById(`input-${index}`);
            const feedbackEl = document.getElementById(`feedback-${index}`);
            const data = staticData[currentLang];
            
            const userAnswer = parseFloat(inputEl.value);
            feedbackEl.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700');

            if (userAnswer === correctAnswer) {
                feedbackEl.innerHTML = `
                    <div class="font-bold text-green-800 mb-1">${data.correctMsg}</div>
                    <div class="text-[10px] text-green-600 border-t border-green-200 pt-1 mt-1">
                        איזנת את המשוואה וביצעת פעולות הופכיות בצורה מדויקת משמאל לימין על הדף!
                    </div>
                `;
                feedbackEl.classList.add('bg-green-50', 'text-green-700');
                feedbackEl.classList.remove('hidden');
                solvedQuestions.add(index);
            } else {
                feedbackEl.innerHTML = `
                    <div class="font-bold text-red-800 mb-1">${data.wrongPrefix}</div>
                    <div class="text-[11px] text-red-600 border-t border-red-200 pt-1 mt-1">
                        <strong>הרמז שלך:</strong> ${hintMessage} <br>
                        <span class="text-gray-500 block mt-1">נסה לרשום את המשוואה בצורה אופקית משמאל לימין על הנייר, ובצע שלב אחר שלב.</span>
                    </div>
                `;
                feedbackEl.classList.add('bg-red-50', 'text-red-700');
                feedbackEl.classList.remove('hidden');
                solvedQuestions.delete(index);
            }
            
            updateScoreDisplay();
        }

        function updateScoreDisplay() {
            document.getElementById('current-score').innerText = solvedQuestions.size;
        }

        window.onload = () => {
            changeLanguage('he');
        };
    </script>
</body>
</html>
